name: CI/CD Frontend — Innovatech Chile

on:
  push:
    branches:
      - deploy

env:
  IMAGE_FULL_NAME: tomasvaldivia20/frontend-despacho

jobs:
  build-and-push:
    name: Build & Push imagen Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: tomasvaldivia20
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FULL_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_VENTAS_URL=
            VITE_DESPACHOS_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy en EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        # Aquí definimos las variables para que el paso las vea
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
          IMAGE_FULL_NAME: ${{ env.IMAGE_FULL_NAME }}
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Aquí le decimos a la acción que las "inyecte" en la sesión SSH
          envs: DOCKERHUB_TOKEN,BACKEND_PRIVATE_IP,IMAGE_FULL_NAME
          script: |
            set -e
            
            echo "--- Iniciando Sesión Docker ---"
            echo "$DOCKERHUB_TOKEN" | docker login -u tomasvaldivia20 --password-stdin
            
            echo "--- Descargando imagen: $IMAGE_FULL_NAME:latest ---"
            docker pull $IMAGE_FULL_NAME:latest

            echo "--- Limpiando contenedores anteriores ---"
            docker stop frontend-despacho 2>/dev/null || true
            docker rm frontend-despacho 2>/dev/null || true

            echo "--- Lanzando nuevo contenedor ---"
            docker run -d \
              --name frontend-despacho \
              --restart unless-stopped \
              -p 80:8080 \
              -e BACKEND_HOST=$BACKEND_PRIVATE_IP \
              $IMAGE_FULL_NAME:latest
            
            docker image prune -f
            echo "--- Despliegue completado con éxito ---"