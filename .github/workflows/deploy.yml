name: CI/CD Frontend — Innovatech Chile

on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-despacho

jobs:
  build-and-push:
    name: Build & Push imagen Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile      # <--- Nombre correcto del input
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_VENTAS_URL=
            VITE_DESPACHOS_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy en EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout para obtener archivos de config
        uses: actions/checkout@v4

      - name: Copiar docker-compose al EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/frontend"
          overwrite: true

      - name: Deploy en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          script: |
            set -e # Detiene el script si falla un comando
            cd /home/ubuntu/frontend

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull ${{ env.IMAGE_NAME }}:latest

            # Limpieza y reinicio
            docker stop frontend-despacho 2>/dev/null || true
            docker rm frontend-despacho 2>/dev/null || true

            docker run -d \
              --name frontend-despacho \
              --restart unless-stopped \
              -p 80:8080 \
              -e BACKEND_HOST=${{ secrets.BACKEND_PRIVATE_IP }} \
              -v frontend-logs:/var/log/nginx \
              ${{ env.IMAGE_NAME }}:latest

            docker image prune -f